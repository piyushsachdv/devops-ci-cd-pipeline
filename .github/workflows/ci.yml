name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: |
        # Convert username to lowercase to satisfy Docker naming rules
        REPO_NAME=$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')
        docker build -t $REPO_NAME/ci-cd-app:latest .

    - name: Run Container for Testing
      run: |
        REPO_NAME=$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')
        docker run -d -p 5000:5000 --name test-app $REPO_NAME/ci-cd-app:latest
        sleep 5

    - name: Test Application
      run: |
        # Check if the Flask app returns the success message
        curl http://localhost:5000 | grep "CI/CD Pipeline is Working!"

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Push to Docker Hub
      run: |
        REPO_NAME=$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')
        docker push $REPO_NAME/ci-cd-app:latest

