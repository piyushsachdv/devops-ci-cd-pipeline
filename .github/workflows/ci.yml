name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        run: |
          docker build -t piyushsachdv/ci-cd-app:latest .
          docker push piyushsachdv/ci-cd-app:latest

      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the absolute latest img
            docker pull piyushsachdv/ci-cd-app:latest
            
            # Stop and remove the container named 'app'
            docker stop app || true
            docker rm app || true
            
            # Run the new container with the fixed name 'app'
            docker run -d --name app -p 5000:5000 piyushsachdv/ci-cd-app:latest
            
            # Cleanup old images
            docker image prune -f

