name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-app .

    - name: Run Container for Testing
      run: |
        docker run -d -p 5000:5000 --name test-app ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-app
        sleep 5

    - name: Test Application
      run: curl http://localhost:5000 | grep "CI/CD Pipeline is Working!"

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Push to Docker Hub
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-app

